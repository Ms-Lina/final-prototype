# Render Blueprint – MenyAI backend (monorepo: service lives in backend/)
# Deploy: Connect this repo at render.com → New → Blueprint → connect repo, or New → Web Service with Root Directory = backend
services:
  - type: web
    name: menyai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
